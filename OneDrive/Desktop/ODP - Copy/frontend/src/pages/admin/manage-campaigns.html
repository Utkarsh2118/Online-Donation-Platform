<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Manage Campaigns</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.page-title {
			margin: 0.5rem 0 0.35rem;
			font-size: clamp(1.45rem, 2.9vw, 2.1rem);
		}

		.muted {
			color: var(--muted);
			margin: 0;
		}

		.nav-actions {
			display: flex;
			gap: 0.5rem;
			flex-wrap: wrap;
		}

		.nav-actions .btn.active {
			background: linear-gradient(135deg, #0f766e 0%, #0b5f58 100%);
			border-color: #0f766e;
			color: #ffffff;
		}

		.layout {
			display: grid;
			grid-template-columns: 1fr 1.5fr;
			gap: 1rem;
			margin: 0.9rem 0 1.35rem;
		}

		.card {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 12px;
			box-shadow: var(--shadow-soft);
			padding: 1rem;
		}

		.card h2,
		.card h3 {
			margin: 0 0 0.65rem;
		}

		.field {
			display: grid;
			gap: 0.34rem;
			margin-bottom: 0.75rem;
		}

		.field label {
			font-size: 0.9rem;
			font-weight: 700;
		}

		.field input,
		.field textarea,
		.field select {
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			padding: 0.68rem 0.8rem;
			font: inherit;
			background: #fff;
			width: 100%;
		}

		.field textarea {
			min-height: 110px;
			resize: vertical;
		}

		.toolbar {
			display: flex;
			gap: 0.6rem;
			flex-wrap: wrap;
			margin-bottom: 0.75rem;
			align-items: center;
		}

		.toolbar input,
		.toolbar select {
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			padding: 0.55rem 0.85rem;
			font: inherit;
			background: #fffefb;
			min-height: 42px;
		}

		.toolbar input {
			flex: 1;
			min-width: 220px;
		}

		.modal-backdrop {
			position: fixed;
			inset: 0;
			background: rgba(15, 23, 42, 0.45);
			display: none;
			align-items: center;
			justify-content: center;
			padding: 1rem;
			z-index: 60;
		}

		.modal-backdrop.show {
			display: flex;
		}

		.quick-modal {
			width: min(560px, 100%);
			background: #ffffff;
			border: 1px solid #dbe3ee;
			border-radius: 14px;
			box-shadow: 0 20px 44px rgba(15, 23, 42, 0.25);
			padding: 1rem;
		}

		.quick-modal-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 0.6rem;
			margin-bottom: 0.8rem;
		}

		.quick-modal-actions {
			display: flex;
			gap: 0.55rem;
			justify-content: flex-end;
			flex-wrap: wrap;
		}

		.panel {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 12px;
			padding: 0.95rem;
			color: var(--muted);
			margin: 0.8rem 0;
		}

		.hidden {
			display: none;
		}

		.campaign-list {
			display: grid;
			gap: 0.7rem;
			max-height: 670px;
			overflow: auto;
			padding-right: 0.15rem;
		}

		.campaign-item {
			border: 1px solid #e2e8f0;
			background: #ffffff;
			border-radius: 11px;
			padding: 0.72rem;
			display: grid;
			gap: 0.36rem;
		}

		.campaign-item .top {
			display: flex;
			justify-content: space-between;
			gap: 0.5rem;
			align-items: center;
		}

		.status {
			display: inline-flex;
			padding: 0.14rem 0.48rem;
			border-radius: 999px;
			font-size: 0.76rem;
			font-weight: 700;
			text-transform: capitalize;
		}

		.status.active {
			background: #ecfdf3;
			color: #067647;
		}

		.status.paused {
			background: #fef0c7;
			color: #92400e;
		}

		.status.completed {
			background: #e0f2fe;
			color: #075985;
		}

		.actions {
			display: flex;
			gap: 0.5rem;
			flex-wrap: wrap;
			margin-top: 0.3rem;
		}

		.edit-box {
			margin-top: 0.65rem;
			border: 1px dashed #d9c9b3;
			border-radius: 10px;
			padding: 0.65rem;
			background: #f8fafc;
		}

		.pagination {
			margin-top: 0.75rem;
			display: flex;
			justify-content: space-between;
			gap: 0.7rem;
			align-items: center;
			flex-wrap: wrap;
		}

		.alert {
			display: none;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
			margin-bottom: 0.65rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}

		@media (max-width: 980px) {
			.layout {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="page-shell">
		<nav class="nav" aria-label="Primary">
			<a class="brand" href="./dashboard.html">OpenDonate Admin</a>
			<div class="nav-actions">
				<a class="btn btn-secondary" href="./dashboard.html">Dashboard</a>
				<a class="btn btn-secondary active" href="./manage-campaigns.html">Manage Campaigns</a>
				<a class="btn btn-secondary" href="./manage-users.html">Manage Users</a>
				<a class="btn btn-secondary" href="./donations-overview.html">Donations Overview</a>
				<a class="btn btn-secondary" href="./audit-logs.html">Audit Logs</a>
				<button id="logoutBtn" class="btn btn-outline" type="button">Logout</button>
			</div>
		</nav>

		<h1 class="page-title">Manage Campaigns</h1>
		<p class="muted">Create, update, and control campaign lifecycle with better visibility.</p>

		<section id="feedbackPanel" class="panel">Loading campaign manager...</section>

		<section id="managerLayout" class="layout hidden">
			<article class="card">
				<h2>Create Campaign</h2>
				<div id="createAlert" class="alert"></div>

				<form id="createForm" novalidate>
					<div class="field">
						<label for="title">Title</label>
						<input id="title" name="title" type="text" minlength="5" maxlength="120" required />
					</div>

					<div class="field">
						<label for="description">Description</label>
						<textarea id="description" name="description" minlength="20" required></textarea>
					</div>

					<div class="field">
						<label for="goalAmount">Goal Amount (INR)</label>
						<input id="goalAmount" name="goalAmount" type="number" min="1" step="1" required />
					</div>

					<div class="field">
						<label for="status">Status</label>
						<select id="status" name="status">
							<option value="active">Active</option>
							<option value="paused">Paused</option>
							<option value="completed">Completed</option>
						</select>
					</div>

					<div class="field">
						<label for="coverImage">Cover Image URL (optional)</label>
						<input id="coverImage" name="coverImage" type="url" />
					</div>

					<button id="createBtn" class="btn btn-primary" type="submit">Create Campaign</button>
				</form>
			</article>

			<article class="card">
				<h3>Campaign List</h3>

				<section class="toolbar" aria-label="Filters">
					<input id="searchInput" type="search" placeholder="Search campaigns" />
					<select id="limitFilter">
						<option value="8">8 / page</option>
						<option value="20">20 / page</option>
						<option value="50">50 / page</option>
						<option value="100">100 / page</option>
					</select>
					<select id="statusFilter">
						<option value="">All Status</option>
						<option value="active">Active</option>
						<option value="paused">Paused</option>
						<option value="completed">Completed</option>
					</select>
					<select id="recordFilter">
						<option value="active">Active Records</option>
						<option value="all">All Records</option>
						<option value="deleted">Archived Records</option>
					</select>
					<select id="sortBy">
						<option value="createdAt">Sort: Latest</option>
						<option value="title">Title</option>
						<option value="goalAmount">Goal Amount</option>
						<option value="raisedAmount">Raised Amount</option>
						<option value="status">Status</option>
					</select>
					<select id="sortDir">
						<option value="desc">Desc</option>
						<option value="asc">Asc</option>
					</select>
					<button id="applyFilterBtn" class="btn btn-outline" type="button">Apply</button>
					<button id="quickCreateBtn" class="btn btn-secondary" type="button">Quick Create</button>
					<button id="bulkPauseBtn" class="btn btn-secondary" type="button">Bulk Pause</button>
					<button id="bulkActivateBtn" class="btn btn-secondary" type="button">Bulk Activate</button>
					<button id="bulkRestoreBtn" class="btn btn-secondary" type="button">Bulk Restore</button>
					<button id="bulkDeleteBtn" class="btn btn-outline" type="button">Bulk Delete</button>
					<button id="bulkExportBtn" class="btn btn-outline" type="button">Export Selected</button>
				</section>

				<div id="listAlert" class="alert"></div>
				<section id="campaignList" class="campaign-list"></section>

				<section class="pagination">
					<button id="prevBtn" class="btn btn-outline" type="button">Previous</button>
					<span id="pageMeta" class="muted">Page 1 of 1</span>
					<button id="nextBtn" class="btn btn-outline" type="button">Next</button>
				</section>
			</article>
		</section>

		<div id="quickCreateModal" class="modal-backdrop" aria-hidden="true">
			<section class="quick-modal" role="dialog" aria-modal="true" aria-labelledby="quickCreateTitle">
				<div class="quick-modal-head">
					<h3 id="quickCreateTitle">Quick Create Campaign</h3>
					<button id="quickCreateClose" class="btn btn-outline" type="button">Close</button>
				</div>
				<div id="quickCreateAlert" class="alert"></div>
				<form id="quickCreateForm" novalidate>
					<div class="field">
						<label for="quickTitle">Title</label>
						<input id="quickTitle" name="title" type="text" minlength="5" maxlength="120" required />
					</div>
					<div class="field">
						<label for="quickGoalAmount">Goal Amount (INR)</label>
						<input id="quickGoalAmount" name="goalAmount" type="number" min="1" step="1" required />
					</div>
					<div class="field">
						<label for="quickDescription">Description</label>
						<textarea id="quickDescription" name="description" minlength="20" required></textarea>
					</div>
					<div class="quick-modal-actions">
						<button id="quickCreateSubmit" class="btn btn-primary" type="submit">Create Now</button>
					</div>
				</form>
			</section>
		</div>
	</div>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script src="../../assets/js/layout.js"></script>
	<script>
		const feedbackPanel = document.getElementById('feedbackPanel');
		const managerLayout = document.getElementById('managerLayout');
		const createForm = document.getElementById('createForm');
		const createAlert = document.getElementById('createAlert');
		const createBtn = document.getElementById('createBtn');
		const listAlert = document.getElementById('listAlert');
		const campaignList = document.getElementById('campaignList');
		const searchInput = document.getElementById('searchInput');
		const limitFilter = document.getElementById('limitFilter');
		const statusFilter = document.getElementById('statusFilter');
		const recordFilter = document.getElementById('recordFilter');
		const applyFilterBtn = document.getElementById('applyFilterBtn');
		const sortBy = document.getElementById('sortBy');
		const sortDir = document.getElementById('sortDir');
		const quickCreateBtn = document.getElementById('quickCreateBtn');
		const quickCreateModal = document.getElementById('quickCreateModal');
		const quickCreateClose = document.getElementById('quickCreateClose');
		const quickCreateForm = document.getElementById('quickCreateForm');
		const quickCreateAlert = document.getElementById('quickCreateAlert');
		const quickCreateSubmit = document.getElementById('quickCreateSubmit');
		const bulkPauseBtn = document.getElementById('bulkPauseBtn');
		const bulkActivateBtn = document.getElementById('bulkActivateBtn');
		const bulkRestoreBtn = document.getElementById('bulkRestoreBtn');
		const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');
		const bulkExportBtn = document.getElementById('bulkExportBtn');
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const pageMeta = document.getElementById('pageMeta');
		const logoutBtn = document.getElementById('logoutBtn');

		const state = {
			page: 1,
			limit: Number(localStorage.getItem('odp.admin.campaigns.limit') || 8),
			totalPages: 1,
			search: '',
			status: '',
			record: 'active',
			sortBy: 'createdAt',
			sortDir: 'desc',
			selectedIds: []
		};

		function renderCampaignSkeleton() {
			campaignList.innerHTML = Array.from({ length: 5 }).map(() => `
				<article class="campaign-item skeleton-card">
					<div class="skeleton skeleton-line" style="width: 44%;"></div>
					<div class="skeleton skeleton-line" style="width: 88%;"></div>
					<div class="skeleton skeleton-line" style="width: 72%;"></div>
				</article>
			`).join('');
		}

		function applySort(campaigns) {
			const factor = state.sortDir === 'asc' ? 1 : -1;
			return [...campaigns].sort((a, b) => {
				const left = a?.[state.sortBy];
				const right = b?.[state.sortBy];
				if (state.sortBy === 'goalAmount' || state.sortBy === 'raisedAmount') {
					return (Number(left || 0) - Number(right || 0)) * factor;
				}
				if (state.sortBy === 'createdAt') {
					return (new Date(left).getTime() - new Date(right).getTime()) * factor;
				}
				const l = String(left || '').toLowerCase();
				const r = String(right || '').toLowerCase();
				if (l < r) return -1 * factor;
				if (l > r) return 1 * factor;
				return 0;
			});
		}

		function openQuickModal() {
			quickCreateModal.classList.add('show');
			quickCreateModal.setAttribute('aria-hidden', 'false');
		}

		function closeQuickModal() {
			quickCreateModal.classList.remove('show');
			quickCreateModal.setAttribute('aria-hidden', 'true');
			clearAlert(quickCreateAlert);
		}

		function formatCurrency(value) {
			return new Intl.NumberFormat('en-IN', {
				style: 'currency',
				currency: 'INR',
				maximumFractionDigits: 0
			}).format(Number(value || 0));
		}

		function setAlert(el, message, type) {
			el.className = `alert ${type}`;
			el.textContent = message;
		}

		function clearAlert(el) {
			el.className = 'alert';
			el.textContent = '';
		}

		function showPanel(message) {
			feedbackPanel.style.display = 'block';
			feedbackPanel.textContent = message;
			managerLayout.classList.add('hidden');
		}

		function showManager() {
			feedbackPanel.style.display = 'none';
			managerLayout.classList.remove('hidden');
		}

		function createEditTemplate(campaign) {
			return `
				<div class="edit-box" data-edit-box="${campaign._id}">
					<div class="field">
						<label>Title</label>
						<input type="text" data-edit-field="title" value="${campaign.title}" />
					</div>
					<div class="field">
						<label>Description</label>
						<textarea data-edit-field="description">${campaign.description}</textarea>
					</div>
					<div class="field">
						<label>Goal Amount</label>
						<input type="number" min="1" step="1" data-edit-field="goalAmount" value="${campaign.goalAmount}" />
					</div>
					<div class="field">
						<label>Status</label>
						<select data-edit-field="status">
							<option value="active" ${campaign.status === 'active' ? 'selected' : ''}>Active</option>
							<option value="paused" ${campaign.status === 'paused' ? 'selected' : ''}>Paused</option>
							<option value="completed" ${campaign.status === 'completed' ? 'selected' : ''}>Completed</option>
						</select>
					</div>
					<div class="field">
						<label>Cover Image URL</label>
						<input type="url" data-edit-field="coverImage" value="${campaign.coverImage || ''}" />
					</div>
					<div class="actions">
						<button class="btn btn-primary" type="button" data-save-id="${campaign._id}">Save</button>
						<button class="btn btn-outline" type="button" data-cancel-id="${campaign._id}">Cancel</button>
					</div>
				</div>
			`;
		}

		function renderList(campaigns) {
			if (!campaigns.length) {
				campaignList.innerHTML = '<article class="campaign-item">No campaigns found with current filters.<div class="empty-cta"><button id="resetCampaignFiltersBtn" class="btn btn-secondary btn-sm" type="button">Reset Filters</button><button id="openQuickCreateFromEmpty" class="btn btn-primary btn-sm" type="button">Quick Create</button></div></article>';
				const resetBtn = document.getElementById('resetCampaignFiltersBtn');
				const quickBtn = document.getElementById('openQuickCreateFromEmpty');
				if (resetBtn) {
					resetBtn.addEventListener('click', () => {
						searchInput.value = '';
						statusFilter.value = '';
						sortBy.value = 'createdAt';
						sortDir.value = 'desc';
						state.search = '';
						state.status = '';
						state.sortBy = 'createdAt';
						state.sortDir = 'desc';
						state.page = 1;
						fetchCampaigns();
					});
				}
				if (quickBtn) {
					quickBtn.addEventListener('click', openQuickModal);
				}
				return;
			}

			const sortedCampaigns = applySort(campaigns);
			campaignList.innerHTML = sortedCampaigns.map((campaign) => `
				<article class="campaign-item" data-item-id="${campaign._id}">
					<div class="top">
						<strong><label><input type="checkbox" data-select-id="${campaign._id}" ${state.selectedIds.includes(campaign._id) ? 'checked' : ''}/> ${campaign.title}</label></strong>
						<span class="status ${campaign.status}">${campaign.status}</span>
					</div>
					<span class="muted">Goal: ${formatCurrency(campaign.goalAmount)} | Raised: ${formatCurrency(campaign.raisedAmount)}</span>
					<span class="muted">${campaign.description.length > 140 ? `${campaign.description.slice(0, 140)}...` : campaign.description}</span>
					<div class="actions">
						<button class="btn btn-outline" type="button" data-edit-id="${campaign._id}">Edit</button>
						${campaign.isDeleted ? `<button class="btn btn-secondary" type="button" data-restore-id="${campaign._id}">Restore</button>` : `<button class="btn btn-secondary" type="button" data-delete-id="${campaign._id}">Archive</button>`}
					</div>
				</article>
			}).join('');

			campaignList.querySelectorAll('[data-edit-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					const id = btn.getAttribute('data-edit-id');
					const item = campaignList.querySelector(`[data-item-id="${id}"]`);
					const campaign = sortedCampaigns.find((c) => c._id === id);

					if (!item || !campaign || item.querySelector('[data-edit-box]')) {
						return;
					}

					item.insertAdjacentHTML('beforeend', createEditTemplate(campaign));

					item.querySelector(`[data-cancel-id="${id}"]`).addEventListener('click', () => {
						const box = item.querySelector(`[data-edit-box="${id}"]`);
						if (box) {
							box.remove();
						}
					});

					item.querySelector(`[data-save-id="${id}"]`).addEventListener('click', () => {
						handleUpdateCampaign(item, id);
					});
				});
			});

			campaignList.querySelectorAll('[data-delete-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					const id = btn.getAttribute('data-delete-id');
					handleDeleteCampaign(id);
				});
			});

			campaignList.querySelectorAll('[data-restore-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					const id = btn.getAttribute('data-restore-id');
					handleRestoreCampaign(id);
				});
			});

			campaignList.querySelectorAll('[data-select-id]').forEach((checkbox) => {
				checkbox.addEventListener('change', () => {
					const id = checkbox.getAttribute('data-select-id');
					if (!id) return;
					if (checkbox.checked) {
						if (!state.selectedIds.includes(id)) {
							state.selectedIds.push(id);
						}
					} else {
						state.selectedIds = state.selectedIds.filter((item) => item !== id);
					}
				});
			});
		}

		async function fetchCampaigns() {
			clearAlert(listAlert);
			renderCampaignSkeleton();

			const params = new URLSearchParams({
				page: String(state.page),
				limit: String(state.limit)
			});

			if (state.search) {
				params.set('search', state.search);
			}

			if (state.status) {
				params.set('status', state.status);
			}

			if (state.record === 'all') {
				params.set('includeDeleted', 'true');
			} else if (state.record === 'deleted') {
				params.set('deleted', 'true');
			}

			try {
				const response = await apiRequest(`/admin/campaigns?${params.toString()}`);
				const campaigns = response?.data?.campaigns || [];
				const pagination = response?.data?.pagination || {};

				state.totalPages = Number(pagination.totalPages || 1);
				pageMeta.textContent = `Page ${state.page} of ${state.totalPages}`;
				prevBtn.disabled = state.page <= 1;
				nextBtn.disabled = state.page >= state.totalPages;

				renderList(campaigns);
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to load campaigns.', 'error');
				campaignList.innerHTML = '<article class="campaign-item">Unable to load campaigns right now.</article>';
			}
		}

		async function handleQuickCreate(event) {
			event.preventDefault();
			clearAlert(quickCreateAlert);

			const formData = new FormData(quickCreateForm);
			const payload = {
				title: String(formData.get('title') || '').trim(),
				description: String(formData.get('description') || '').trim(),
				goalAmount: Number(formData.get('goalAmount')),
				status: 'active',
				coverImage: ''
			};

			if (payload.title.length < 5 || payload.description.length < 20 || payload.goalAmount < 1) {
				setAlert(quickCreateAlert, 'Please provide valid campaign details.', 'error');
				return;
			}

			quickCreateSubmit.disabled = true;
			quickCreateSubmit.textContent = 'Creating...';

			try {
				await apiRequest('/admin/campaigns', {
					method: 'POST',
					body: JSON.stringify(payload)
				});
				setAlert(quickCreateAlert, 'Campaign created successfully.', 'ok');
				quickCreateForm.reset();
				state.page = 1;
				await fetchCampaigns();
				setTimeout(closeQuickModal, 450);
			} catch (error) {
				setAlert(quickCreateAlert, error.message || 'Failed to create campaign.', 'error');
			} finally {
				quickCreateSubmit.disabled = false;
				quickCreateSubmit.textContent = 'Create Now';
			}
		}

		async function handleCreateCampaign(event) {
			event.preventDefault();
			clearAlert(createAlert);

			const formData = new FormData(createForm);
			const payload = {
				title: String(formData.get('title') || '').trim(),
				description: String(formData.get('description') || '').trim(),
				goalAmount: Number(formData.get('goalAmount')),
				status: String(formData.get('status') || 'active'),
				coverImage: String(formData.get('coverImage') || '').trim()
			};

			if (payload.title.length < 5 || payload.description.length < 20 || payload.goalAmount < 1) {
				setAlert(createAlert, 'Please provide valid title, description, and goal amount.', 'error');
				return;
			}

			createBtn.disabled = true;
			createBtn.textContent = 'Creating...';

			try {
				await apiRequest('/admin/campaigns', {
					method: 'POST',
					body: JSON.stringify(payload)
				});

				setAlert(createAlert, 'Campaign created successfully.', 'ok');
				createForm.reset();
				state.page = 1;
				await fetchCampaigns();
			} catch (error) {
				setAlert(createAlert, error.message || 'Failed to create campaign.', 'error');
			} finally {
				createBtn.disabled = false;
				createBtn.textContent = 'Create Campaign';
			}
		}

		async function handleUpdateCampaign(item, id) {
			const box = item.querySelector(`[data-edit-box="${id}"]`);
			if (!box) {
				return;
			}

			const payload = {
				title: box.querySelector('[data-edit-field="title"]').value.trim(),
				description: box.querySelector('[data-edit-field="description"]').value.trim(),
				goalAmount: Number(box.querySelector('[data-edit-field="goalAmount"]').value),
				status: box.querySelector('[data-edit-field="status"]').value,
				coverImage: box.querySelector('[data-edit-field="coverImage"]').value.trim()
			};

			if (payload.title.length < 5 || payload.description.length < 20 || payload.goalAmount < 1) {
				setAlert(listAlert, 'Invalid update data. Please review campaign fields.', 'error');
				return;
			}

			try {
				await apiRequest(`/admin/campaigns/${id}`, {
					method: 'PUT',
					body: JSON.stringify(payload)
				});

				setAlert(listAlert, 'Campaign updated successfully.', 'ok');
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to update campaign.', 'error');
			}
		}

		async function handleDeleteCampaign(id) {
			const confirmed = window.confirm('Archive this campaign?');
			if (!confirmed) {
				return;
			}

			try {
				await apiRequest(`/admin/campaigns/${id}`, {
					method: 'DELETE'
				});

				setAlert(listAlert, 'Campaign archived successfully.', 'ok');
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to archive campaign.', 'error');
			}
		}

		async function handleRestoreCampaign(id) {
			try {
				await apiRequest(`/admin/campaigns/${id}/restore`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'Campaign restored successfully.', 'ok');
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to restore campaign.', 'error');
			}
		}

		async function handleBulkStatusUpdate(status) {
			if (!state.selectedIds.length) {
				setAlert(listAlert, 'Select campaigns first.', 'error');
				return;
			}
			try {
				await Promise.all(state.selectedIds.map((id) => apiRequest(`/admin/campaigns/${id}`, {
					method: 'PUT',
					body: JSON.stringify({ status })
				})));
				setAlert(listAlert, `Updated ${state.selectedIds.length} campaigns to ${status}.`, 'ok');
				state.selectedIds = [];
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Bulk update failed.', 'error');
			}
		}

		async function handleBulkRestore() {
			if (!state.selectedIds.length) {
				setAlert(listAlert, 'Select campaigns first.', 'error');
				return;
			}
			try {
				await Promise.all(state.selectedIds.map((id) => apiRequest(`/admin/campaigns/${id}/restore`, { method: 'PATCH' })));
				setAlert(listAlert, 'Selected campaigns restored.', 'ok');
				state.selectedIds = [];
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Bulk restore failed.', 'error');
			}
		}

		async function handleBulkDelete() {
			if (!state.selectedIds.length) {
				setAlert(listAlert, 'Select campaigns first.', 'error');
				return;
			}
			const confirmed = window.confirm(`Delete ${state.selectedIds.length} selected campaigns?`);
			if (!confirmed) return;
			try {
				await Promise.all(state.selectedIds.map((id) => apiRequest(`/admin/campaigns/${id}`, { method: 'DELETE' })));
				setAlert(listAlert, 'Selected campaigns deleted.', 'ok');
				state.selectedIds = [];
				await fetchCampaigns();
			} catch (error) {
				setAlert(listAlert, error.message || 'Bulk delete failed.', 'error');
			}
		}

		function handleBulkExport() {
			if (!state.selectedIds.length) {
				setAlert(listAlert, 'Select campaigns first.', 'error');
				return;
			}
			const rows = [...campaignList.querySelectorAll('.campaign-item')]
				.filter((item) => state.selectedIds.includes(item.getAttribute('data-item-id')))
				.map((item) => item.textContent.replace(/\s+/g, ' ').trim());
			const csv = ['Campaign Summary', ...rows.map((row) => `"${row.replace(/"/g, '""')}"`)].join('\n');
			const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
			const link = document.createElement('a');
			link.href = URL.createObjectURL(blob);
			link.download = 'campaigns-selected.csv';
			document.body.appendChild(link);
			link.click();
			link.remove();
		}

		function initControls() {
			limitFilter.value = String(state.limit);
			limitFilter.addEventListener('change', () => {
				state.limit = Number(limitFilter.value || 8);
				localStorage.setItem('odp.admin.campaigns.limit', String(state.limit));
				state.page = 1;
				fetchCampaigns();
			});

			applyFilterBtn.addEventListener('click', () => {
				applyFilterBtn.classList.add('pulse-once');
				state.search = searchInput.value.trim();
				state.status = statusFilter.value;
				state.record = recordFilter.value;
				state.sortBy = sortBy.value;
				state.sortDir = sortDir.value;
				state.page = 1;
				fetchCampaigns();
				setTimeout(() => applyFilterBtn.classList.remove('pulse-once'), 600);
			});

			searchInput.addEventListener('keydown', (event) => {
				if (event.key === 'Enter') {
					state.search = searchInput.value.trim();
					state.status = statusFilter.value;
					state.record = recordFilter.value;
					state.sortBy = sortBy.value;
					state.sortDir = sortDir.value;
					state.page = 1;
					fetchCampaigns();
				}
			});

			quickCreateBtn.addEventListener('click', openQuickModal);
			bulkPauseBtn.addEventListener('click', () => handleBulkStatusUpdate('paused'));
			bulkActivateBtn.addEventListener('click', () => handleBulkStatusUpdate('active'));
			bulkRestoreBtn.addEventListener('click', handleBulkRestore);
			bulkDeleteBtn.addEventListener('click', handleBulkDelete);
			bulkExportBtn.addEventListener('click', handleBulkExport);
			quickCreateClose.addEventListener('click', closeQuickModal);
			quickCreateModal.addEventListener('click', (event) => {
				if (event.target === quickCreateModal) {
					closeQuickModal();
				}
			});
			quickCreateForm.addEventListener('submit', handleQuickCreate);

			prevBtn.addEventListener('click', () => {
				if (state.page > 1) {
					state.page -= 1;
					fetchCampaigns();
				}
			});

			nextBtn.addEventListener('click', () => {
				if (state.page < state.totalPages) {
					state.page += 1;
					fetchCampaigns();
				}
			});

			createForm.addEventListener('submit', handleCreateCampaign);
		}

		function init() {
			if (!Auth.requireRole(['admin', 'super_admin'], './login.html')) {
				return;
			}

			ODPLayout.initGlobalUX({
				pageHeader: {
					pageKey: 'admin-campaigns',
					containerSelector: '.page-shell',
					title: 'Campaign Operations',
					subtitle: 'Create, moderate, bulk update, and export campaign operations with confidence.',
					primaryAction: { label: 'Quick Create', href: '#quickCreateBtn' }
				}
			});

			logoutBtn.addEventListener('click', () => {
				Auth.clearSession();
				window.location.href = './login.html';
			});

			initControls();
			showManager();
			fetchCampaigns();
		}

		init();
	</script>
</body>
</html>
