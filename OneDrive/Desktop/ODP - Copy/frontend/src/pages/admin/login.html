<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Admin Login</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.auth-wrap {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1.2rem;
		}

		.auth-card {
			width: min(470px, 100%);
			background: #ffffff;
			border-radius: 16px;
			box-shadow: var(--shadow-soft);
			padding: 1.2rem;
			border: 1px solid #e2e8f0;
		}

		.badge {
			display: inline-flex;
			padding: 0.2rem 0.56rem;
			border-radius: 999px;
			font-size: 0.75rem;
			font-weight: 800;
			letter-spacing: 0.35px;
			text-transform: uppercase;
			background: #fef0c7;
			color: #92400e;
		}

		.auth-card h1 {
			margin: 0.45rem 0 0.5rem;
			font-size: 1.42rem;
		}

		.auth-card p {
			margin: 0 0 1rem;
			color: var(--muted);
		}

		.field {
			display: grid;
			gap: 0.35rem;
			margin-bottom: 0.85rem;
		}

		.field label {
			font-size: 0.9rem;
			font-weight: 700;
		}

		.field input {
			width: 100%;
			border: 1px solid #cbd5e1;
			border-radius: 10px;
			padding: 0.72rem 0.8rem;
			font: inherit;
			background: #fff;
		}

		.auth-footer {
			margin-top: 0.9rem;
			font-size: 0.92rem;
			color: var(--muted);
			display: flex;
			justify-content: space-between;
			gap: 0.7rem;
			flex-wrap: wrap;
		}

		.alert {
			display: none;
			margin-bottom: 0.8rem;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}
	</style>
</head>
<body>
	<main class="auth-wrap">
		<section class="auth-card" aria-labelledby="adminLoginTitle">
			<a class="brand" href="../user/landing.html">OpenDonate Platform</a>
			<span class="badge">Admin Access</span>
			<h1 id="adminLoginTitle">Sign in to Admin Panel</h1>
			<p>This area is restricted to authorized administrators only.</p>

			<div id="alertBox" class="alert"></div>

			<form id="adminLoginForm" novalidate>
				<div class="field">
					<label for="email">Admin Email</label>
					<input id="email" name="email" type="email" required />
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" required />
				</div>

				<button id="loginBtn" class="btn btn-primary" type="submit">Login as Admin</button>
			</form>

			<p class="auth-footer">
				<span>Regular user? <a href="../user/login.html">User login</a></span>
				<span>New admin setup: use seeded admin credentials.</span>
			</p>
		</section>
	</main>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script>
		const form = document.getElementById('adminLoginForm');
		const loginBtn = document.getElementById('loginBtn');
		const alertBox = document.getElementById('alertBox');

		function showAlert(message, type) {
			alertBox.className = `alert ${type}`;
			alertBox.textContent = message;
		}

		function clearAlert() {
			alertBox.className = 'alert';
			alertBox.textContent = '';
		}

		function isValidEmail(email) {
			return /^\S+@\S+\.\S+$/.test(email);
		}

		async function handleAdminLogin(event) {
			event.preventDefault();
			clearAlert();

			const formData = new FormData(form);
			const email = String(formData.get('email') || '').trim().toLowerCase();
			const password = String(formData.get('password') || '');

			if (!isValidEmail(email)) {
				showAlert('Please enter a valid email.', 'error');
				return;
			}

			if (!password) {
				showAlert('Password is required.', 'error');
				return;
			}

			loginBtn.disabled = true;
			loginBtn.textContent = 'Signing in...';

			try {
				const response = await apiRequest('/auth/login', {
					method: 'POST',
					body: JSON.stringify({ email, password })
				});

				const token = response?.data?.token;
				const user = response?.data?.user;

				if (!token || !user) {
					throw new Error('Login response is incomplete.');
				}

				if (user.role !== 'admin') {
					Auth.clearSession();
					showAlert('Access denied: this account is not an admin.', 'error');
					return;
				}

				Auth.setSession(token, user);
				showAlert('Admin login successful. Redirecting...', 'ok');

				setTimeout(() => {
					window.location.href = './dashboard.html';
				}, 650);
			} catch (error) {
				const message = error.message || 'Unable to login right now.';
				showAlert(message, 'error');
			} finally {
				loginBtn.disabled = false;
				loginBtn.textContent = 'Login as Admin';
			}
		}

		function init() {
			if (Auth.isLoggedIn()) {
				const user = Auth.getUser();

				if (user?.role === 'admin') {
					window.location.href = './dashboard.html';
					return;
				}

				window.location.href = '../user/campaigns.html';
				return;
			}

			form.addEventListener('submit', handleAdminLogin);
		}

		init();
	</script>
</body>
</html>
