<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Manage Users</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.page-title {
			margin: 0.5rem 0 0.35rem;
			font-size: clamp(1.45rem, 2.9vw, 2.1rem);
		}

		.muted {
			color: var(--muted);
			margin: 0;
		}

		.card {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 8px;
			box-shadow: var(--shadow-soft);
			padding: 1rem;
			margin: 0.9rem 0 1.35rem;
		}

		.toolbar {
			display: flex;
			gap: 0.55rem;
			flex-wrap: wrap;
			margin-bottom: 0.72rem;
			align-items: center;
		}

		.toolbar input,
		.toolbar select {
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			padding: 0.55rem 0.85rem;
			font: inherit;
			background: #fffefb;
		}

		.panel {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 12px;
			padding: 0.95rem;
			color: var(--muted);
			margin: 0.8rem 0;
		}

		.hidden {
			display: none;
		}

		.alert {
			display: none;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
			margin-bottom: 0.65rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}

		.table-wrap {
			border: 1px solid #e2e8f0;
			border-radius: 8px;
			overflow: auto;
			background: #ffffff;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			min-width: 860px;
		}

		th,
		td {
			text-align: left;
			padding: 0.7rem;
			border-bottom: 1px solid #e2e8f0;
			font-size: 0.9rem;
		}

		th {
			background: #f1f5f9;
			font-size: 0.82rem;
			letter-spacing: 0.35px;
			text-transform: uppercase;
			color: #5a4f43;
		}

		.status {
			display: inline-flex;
			padding: 0.15rem 0.5rem;
			border-radius: 999px;
			font-size: 0.76rem;
			font-weight: 700;
			text-transform: capitalize;
		}

		.status.blocked {
			background: #fef3f2;
			color: #b42318;
		}

		.status.active {
			background: #ecfdf3;
			color: #067647;
		}

		.status.admin {
			background: #e0f2fe;
			color: #075985;
		}

		.actions {
			display: flex;
			gap: 0.45rem;
			flex-wrap: wrap;
		}

		.pagination {
			margin-top: 0.75rem;
			display: flex;
			justify-content: space-between;
			gap: 0.7rem;
			align-items: center;
			flex-wrap: wrap;
		}

		@media (max-width: 700px) {
			.toolbar {
				flex-direction: column;
				align-items: stretch;
			}
		}
	</style>
</head>
<body>
	<div class="page-shell">
		<nav class="nav" aria-label="Primary">
			<a class="brand" href="./dashboard.html">OpenDonate Admin</a>
			<div class="nav-actions">
				<a class="btn btn-secondary" href="./dashboard.html">Dashboard</a>
				<a class="btn btn-secondary" href="./manage-campaigns.html">Manage Campaigns</a>
				<a class="btn btn-secondary" href="./donations-overview.html">Donations Overview</a>
				<button id="logoutBtn" class="btn btn-outline" type="button">Logout</button>
			</div>
		</nav>

		<h1 class="page-title">Manage Users</h1>
		<p class="muted">Search members and moderate account access.</p>

		<section id="feedbackPanel" class="panel">Loading user manager...</section>

		<section id="usersCard" class="card hidden">
			<section class="toolbar" aria-label="User filters">
				<input id="searchInput" type="search" placeholder="Search by name or email" />
				<select id="roleFilter">
					<option value="">All Roles</option>
					<option value="user">User</option>
					<option value="admin">Admin</option>
				</select>
				<select id="blockedFilter">
					<option value="">All Status</option>
					<option value="false">Active</option>
					<option value="true">Blocked</option>
				</select>
				<button id="applyFilterBtn" class="btn btn-outline" type="button">Apply</button>
			</section>

			<div id="listAlert" class="alert"></div>

			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Email</th>
							<th>Role</th>
							<th>Status</th>
							<th>Joined</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="usersTableBody"></tbody>
				</table>
			</div>

			<section class="pagination">
				<button id="prevBtn" class="btn btn-outline" type="button">Previous</button>
				<span id="pageMeta" class="muted">Page 1 of 1</span>
				<button id="nextBtn" class="btn btn-outline" type="button">Next</button>
			</section>
		</section>
	</div>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script>
		const feedbackPanel = document.getElementById('feedbackPanel');
		const usersCard = document.getElementById('usersCard');
		const listAlert = document.getElementById('listAlert');
		const usersTableBody = document.getElementById('usersTableBody');
		const searchInput = document.getElementById('searchInput');
		const roleFilter = document.getElementById('roleFilter');
		const blockedFilter = document.getElementById('blockedFilter');
		const applyFilterBtn = document.getElementById('applyFilterBtn');
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const pageMeta = document.getElementById('pageMeta');
		const logoutBtn = document.getElementById('logoutBtn');

		const state = {
			page: 1,
			limit: 10,
			totalPages: 1,
			search: '',
			role: '',
			blocked: ''
		};

		function formatDate(value) {
			const date = new Date(value);
			return date.toLocaleString('en-IN', {
				day: '2-digit',
				month: 'short',
				year: 'numeric',
				hour: '2-digit',
				minute: '2-digit'
			});
		}

		function setAlert(el, message, type) {
			el.className = `alert ${type}`;
			el.textContent = message;
		}

		function clearAlert(el) {
			el.className = 'alert';
			el.textContent = '';
		}

		function showPanel(message) {
			feedbackPanel.style.display = 'block';
			feedbackPanel.textContent = message;
			usersCard.classList.add('hidden');
		}

		function showUsers() {
			feedbackPanel.style.display = 'none';
			usersCard.classList.remove('hidden');
		}

		function userActionsTemplate(user) {
			if (user.role === 'admin') {
				return '<span class="muted">Admin protected</span>';
			}

			const blockAction = user.isBlocked
				? `<button class="btn btn-outline" type="button" data-unblock-id="${user._id}">Unblock</button>`
				: `<button class="btn btn-outline" type="button" data-block-id="${user._id}">Block</button>`;

			return `
				<div class="actions">
					${blockAction}
					<button class="btn btn-secondary" type="button" data-delete-id="${user._id}">Delete</button>
				</div>
			`;
		}

		function renderUsers(users) {
			if (!users.length) {
				usersTableBody.innerHTML = '<tr><td colspan="6">No users found for current filters.</td></tr>';
				return;
			}

			usersTableBody.innerHTML = users.map((user) => {
				const statusClass = user.isBlocked ? 'blocked' : 'active';
				return `
					<tr>
						<td>${user.name || '-'}</td>
						<td>${user.email || '-'}</td>
						<td><span class="status ${user.role}">${user.role}</span></td>
						<td><span class="status ${statusClass}">${statusClass}</span></td>
						<td>${formatDate(user.createdAt)}</td>
						<td>${userActionsTemplate(user)}</td>
					</tr>
				`;
			}).join('');

			usersTableBody.querySelectorAll('[data-block-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleBlockUser(btn.getAttribute('data-block-id'));
				});
			});

			usersTableBody.querySelectorAll('[data-unblock-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleUnblockUser(btn.getAttribute('data-unblock-id'));
				});
			});

			usersTableBody.querySelectorAll('[data-delete-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleDeleteUser(btn.getAttribute('data-delete-id'));
				});
			});
		}

		async function fetchUsers() {
			clearAlert(listAlert);

			const params = new URLSearchParams({
				page: String(state.page),
				limit: String(state.limit)
			});

			if (state.search) {
				params.set('search', state.search);
			}

			if (state.role) {
				params.set('role', state.role);
			}

			if (state.blocked !== '') {
				params.set('blocked', state.blocked);
			}

			try {
				const response = await apiRequest(`/admin/users?${params.toString()}`);
				const users = response?.data?.users || [];
				const pagination = response?.data?.pagination || {};

				state.totalPages = Number(pagination.totalPages || 1);
				pageMeta.textContent = `Page ${state.page} of ${state.totalPages}`;
				prevBtn.disabled = state.page <= 1;
				nextBtn.disabled = state.page >= state.totalPages;

				renderUsers(users);
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to load users.', 'error');
				usersTableBody.innerHTML = '';
			}
		}

		async function handleBlockUser(userId) {
			try {
				await apiRequest(`/admin/users/${userId}/block`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'User blocked successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to block user.', 'error');
			}
		}

		async function handleUnblockUser(userId) {
			try {
				await apiRequest(`/admin/users/${userId}/unblock`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'User unblocked successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to unblock user.', 'error');
			}
		}

		async function handleDeleteUser(userId) {
			const confirmed = window.confirm('Delete this user account permanently?');
			if (!confirmed) {
				return;
			}

			try {
				await apiRequest(`/admin/users/${userId}`, {
					method: 'DELETE'
				});

				setAlert(listAlert, 'User deleted successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to delete user.', 'error');
			}
		}

		function initControls() {
			applyFilterBtn.addEventListener('click', () => {
				state.search = searchInput.value.trim();
				state.role = roleFilter.value;
				state.blocked = blockedFilter.value;
				state.page = 1;
				fetchUsers();
			});

			searchInput.addEventListener('keydown', (event) => {
				if (event.key === 'Enter') {
					state.search = searchInput.value.trim();
					state.role = roleFilter.value;
					state.blocked = blockedFilter.value;
					state.page = 1;
					fetchUsers();
				}
			});

			prevBtn.addEventListener('click', () => {
				if (state.page > 1) {
					state.page -= 1;
					fetchUsers();
				}
			});

			nextBtn.addEventListener('click', () => {
				if (state.page < state.totalPages) {
					state.page += 1;
					fetchUsers();
				}
			});
		}

		function init() {
			if (!Auth.requireAdmin('./login.html')) {
				return;
			}

			logoutBtn.addEventListener('click', () => {
				Auth.clearSession();
				window.location.href = './login.html';
			});

			initControls();
			showUsers();
			fetchUsers();
		}

		init();
	</script>
</body>
</html>
