<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Manage Users</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.page-title {
			margin: 0.5rem 0 0.35rem;
			font-size: clamp(1.45rem, 2.9vw, 2.1rem);
		}

		.muted {
			color: var(--muted);
			margin: 0;
		}

		.nav-actions {
			display: flex;
			gap: 0.5rem;
			flex-wrap: wrap;
		}

		.nav-actions .btn.active {
			background: linear-gradient(135deg, #0f766e 0%, #0b5f58 100%);
			border-color: #0f766e;
			color: #ffffff;
		}

		.card {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 12px;
			box-shadow: var(--shadow-soft);
			padding: 1rem;
			margin: 0.9rem 0 1.35rem;
		}

		.toolbar {
			display: flex;
			gap: 0.55rem;
			flex-wrap: wrap;
			margin-bottom: 0.72rem;
			align-items: center;
		}

		.toolbar input,
		.toolbar select {
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			padding: 0.55rem 0.85rem;
			font: inherit;
			background: #fffefb;
			min-height: 42px;
		}

		.toolbar input {
			flex: 1;
			min-width: 220px;
		}

		.panel {
			background: #ffffff;
			border: 1px solid #e2e8f0;
			border-radius: 12px;
			padding: 0.95rem;
			color: var(--muted);
			margin: 0.8rem 0;
		}

		.hidden {
			display: none;
		}

		.alert {
			display: none;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
			margin-bottom: 0.65rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}

		.table-wrap {
			border: 1px solid #e2e8f0;
			border-radius: 8px;
			overflow: auto;
			background: #ffffff;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			min-width: 860px;
		}

		th,
		td {
			text-align: left;
			padding: 0.7rem;
			border-bottom: 1px solid #e2e8f0;
			font-size: 0.9rem;
		}

		th {
			background: #f1f5f9;
			font-size: 0.82rem;
			letter-spacing: 0.35px;
			text-transform: uppercase;
			color: #5a4f43;
		}

		.status {
			display: inline-flex;
			padding: 0.15rem 0.5rem;
			border-radius: 999px;
			font-size: 0.76rem;
			font-weight: 700;
			text-transform: capitalize;
		}

		.status.blocked {
			background: #fef3f2;
			color: #b42318;
		}

		.status.active {
			background: #ecfdf3;
			color: #067647;
		}

		.status.admin {
			background: #e0f2fe;
			color: #075985;
		}

		.actions {
			display: flex;
			gap: 0.45rem;
			flex-wrap: wrap;
		}

		.user-drawer {
			position: fixed;
			top: 0;
			right: -420px;
			width: min(420px, 100%);
			height: 100vh;
			background: #ffffff;
			border-left: 1px solid #e2e8f0;
			box-shadow: -12px 0 28px rgba(15, 23, 42, 0.15);
			z-index: 70;
			padding: 1rem;
			transition: right 0.26s ease;
			overflow: auto;
		}

		.user-drawer.show {
			right: 0;
		}

		.timeline {
			display: grid;
			gap: 0.55rem;
			margin-top: 0.85rem;
		}

		.timeline-item {
			border: 1px solid #e2e8f0;
			border-radius: 9px;
			padding: 0.6rem;
			background: #f8fafc;
		}

		.pagination {
			margin-top: 0.75rem;
			display: flex;
			justify-content: space-between;
			gap: 0.7rem;
			align-items: center;
			flex-wrap: wrap;
		}

		@media (max-width: 700px) {
			.toolbar {
				flex-direction: column;
				align-items: stretch;
			}
		}
	</style>
</head>
<body class="admin-shell">
	<div class="sidebar-layout">
		<aside class="side-nav" aria-label="Admin navigation">
			<div class="brand">
				<div class="brand-icon">OD</div>
				<span>OpenDonate Admin</span>
			</div>
			<nav class="side-nav-list" aria-label="Admin links">
				<a class="side-nav-link" href='/admin/dashboard'><span class="side-nav-icon">DB</span><span>Dashboard</span></a>
				<a class="side-nav-link" href="/admin/manage-campaigns"><span class="side-nav-icon">CP</span><span>Campaigns</span></a>
				<a class="side-nav-link active" href="/admin/manage-users" aria-current="page"><span class="side-nav-icon">US</span><span>Users</span></a>
				<a class="side-nav-link" href="/admin/donations-overview"><span class="side-nav-icon">DN</span><span>Donations</span></a>
				<a class="side-nav-link" href="/admin/audit-logs"><span class="side-nav-icon">AL</span><span>Audit Logs</span></a>
			</nav>
			<button id="logoutBtn" class="btn btn-outline" type="button">Logout</button>
		</aside>

		<main class="content-panel">
			<h1 class="page-title">Manage Users</h1>
			<p class="muted">Search members and moderate account access.</p>

			<section id="feedbackPanel" class="panel">Loading user manager...</section>

			<section id="usersCard" class="card hidden">
			<section class="toolbar" aria-label="User filters">
				<input id="searchInput" type="search" placeholder="Search by name or email" />
				<select id="limitFilter">
					<option value="10">10 / page</option>
					<option value="25">25 / page</option>
					<option value="50">50 / page</option>
					<option value="100">100 / page</option>
				</select>
				<select id="roleFilter">
					<option value="">All Roles</option>
					<option value="user">User</option>
					<option value="admin">Admin</option>
				</select>
				<select id="blockedFilter">
					<option value="">All Status</option>
					<option value="false">Active</option>
					<option value="true">Blocked</option>
				</select>
				<select id="recordFilter">
					<option value="active">Active Records</option>
					<option value="all">All Records</option>
					<option value="deleted">Archived Records</option>
				</select>
				<button id="applyFilterBtn" class="btn btn-outline" type="button">Apply</button>
			</section>

			<div id="listAlert" class="alert"></div>

			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th class="sortable-th" data-sort="name">Name</th>
							<th class="sortable-th" data-sort="email">Email</th>
							<th class="sortable-th" data-sort="role">Role</th>
							<th class="sortable-th" data-sort="isBlocked">Status</th>
							<th class="sortable-th" data-sort="createdAt">Joined</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="usersTableBody"></tbody>
				</table>
			</div>

			<section class="pagination">
				<button id="prevBtn" class="btn btn-outline" type="button">Previous</button>
				<span id="pageMeta" class="muted">Page 1 of 1</span>
				<button id="nextBtn" class="btn btn-outline" type="button">Next</button>
			</section>
			</section>

			<aside id="userDrawer" class="user-drawer" aria-live="polite" aria-label="User details drawer">
			<div class="card-header">
				<h3 class="card-title">User Details</h3>
				<button id="closeDrawerBtn" class="btn btn-outline btn-sm" type="button">Close</button>
			</div>
			<div id="userDrawerBody" class="text-muted">Select a user row to inspect details.</div>
			</aside>
		</main>
	</div>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script src="../../assets/js/layout.js"></script>
	<script>
		const feedbackPanel = document.getElementById('feedbackPanel');
		const usersCard = document.getElementById('usersCard');
		const listAlert = document.getElementById('listAlert');
		const usersTableBody = document.getElementById('usersTableBody');
		const searchInput = document.getElementById('searchInput');
		const roleFilter = document.getElementById('roleFilter');
		const limitFilter = document.getElementById('limitFilter');
		const blockedFilter = document.getElementById('blockedFilter');
		const recordFilter = document.getElementById('recordFilter');
		const applyFilterBtn = document.getElementById('applyFilterBtn');
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const pageMeta = document.getElementById('pageMeta');
		const logoutBtn = document.getElementById('logoutBtn');
		const userDrawer = document.getElementById('userDrawer');
		const userDrawerBody = document.getElementById('userDrawerBody');
		const closeDrawerBtn = document.getElementById('closeDrawerBtn');

		function safeRequireAdmin(roles, redirectTo) {
			const auth = window.Auth || {};
			const allowedRoles = Array.isArray(roles) ? roles : [roles];
			const redirectTarget = redirectTo || '/admin/login';

			if (typeof auth.requireRole === 'function') {
				return auth.requireRole(allowedRoles, redirectTarget);
			}

			const token = typeof auth.getToken === 'function' ? auth.getToken() : null;
			const user = typeof auth.getUser === 'function' ? auth.getUser() : null;
			const role = String(user?.role || '').toLowerCase();
			const isAllowed = allowedRoles.map((item) => String(item).toLowerCase()).includes(role);

			if (!token || !isAllowed) {
				window.location.href = redirectTarget;
				return false;
			}

			return true;
		}

		const state = {
			page: 1,
			limit: Number(localStorage.getItem('odp.admin.users.limit') || 10),
			totalPages: 1,
			search: '',
			role: '',
			blocked: '',
			record: 'active',
			sortBy: 'createdAt',
			sortDir: 'desc'
		};

		function formatDate(value) {
			const date = new Date(value);
			return date.toLocaleString('en-IN', {
				day: '2-digit',
				month: 'short',
				year: 'numeric',
				hour: '2-digit',
				minute: '2-digit'
			});
		}

		function setAlert(el, message, type) {
			el.className = `alert ${type}`;
			el.textContent = message;
			if (window.ODPLayout?.showToast) {
				window.ODPLayout.showToast(message, type === 'error' ? 'error' : type === 'ok' ? 'success' : 'info');
			}
		}

		function clearAlert(el) {
			el.className = 'alert';
			el.textContent = '';
		}

		function showPanel(message) {
			feedbackPanel.style.display = 'block';
			feedbackPanel.textContent = message;
			usersCard.classList.add('hidden');
		}

		function showUsers() {
			feedbackPanel.style.display = 'none';
			usersCard.classList.remove('hidden');
		}

		function userActionsTemplate(user) {
			if (user.role === 'super_admin') {
				return '<span class="muted">Super admin protected</span>';
			}

			if (user.isDeleted) {
				return `
					<div class="actions">
						<button class="btn btn-secondary" type="button" data-restore-id="${user._id}">Restore</button>
					</div>
				`;
			}

			const blockAction = user.isBlocked
				? `<button class="btn btn-outline" type="button" data-unblock-id="${user._id}">Unblock</button>`
				: `<button class="btn btn-outline" type="button" data-block-id="${user._id}">Block</button>`;

			return `
				<div class="actions">
					${blockAction}
					<button class="btn btn-secondary" type="button" data-archive-id="${user._id}">Archive</button>
				</div>
			`;
		}

		function openUserDrawer(user) {
			const lastLogin = user?.lastLoginAt ? formatDate(user.lastLoginAt) : 'N/A';
			const totalDonations = user?.donationCount ?? 'N/A';
			const totalRaised = user?.totalDonatedAmount ? `INR ${user.totalDonatedAmount}` : 'N/A';
			const archiveState = user?.isDeleted ? 'Archived' : 'Active';
			userDrawerBody.innerHTML = `
				<div class="info-grid">
					<div class="info-item"><label class="info-label">Name</label><div class="info-value">${user?.name || '-'}</div></div>
					<div class="info-item"><label class="info-label">Email</label><div class="info-value">${user?.email || '-'}</div></div>
					<div class="info-item"><label class="info-label">Role</label><div class="info-value">${user?.role || '-'}</div></div>
					<div class="info-item"><label class="info-label">Last Login</label><div class="info-value">${lastLogin}</div></div>
					<div class="info-item"><label class="info-label">Donation Count</label><div class="info-value">${totalDonations}</div></div>
					<div class="info-item"><label class="info-label">Total Donated</label><div class="info-value">${totalRaised}</div></div>
					<div class="info-item"><label class="info-label">Archive State</label><div class="info-value">${archiveState}</div></div>
				</div>
				<div class="timeline">
					<article class="timeline-item">Joined platform on ${formatDate(user?.createdAt)}</article>
					<article class="timeline-item">Account status: ${user?.isBlocked ? 'Blocked' : 'Active'}</article>
					<article class="timeline-item">Record state: ${archiveState}</article>
					<article class="timeline-item">Recent activity timeline sync is ready for backend enrichment.</article>
				</div>
			`;
			userDrawer.classList.add('show');
		}

		function applySort(users) {
			const factor = state.sortDir === 'asc' ? 1 : -1;
			const sorted = [...users].sort((a, b) => {
				const leftRaw = a?.[state.sortBy];
				const rightRaw = b?.[state.sortBy];
				if (state.sortBy === 'createdAt') {
					return (new Date(leftRaw).getTime() - new Date(rightRaw).getTime()) * factor;
				}
				const left = String(leftRaw ?? '').toLowerCase();
				const right = String(rightRaw ?? '').toLowerCase();
				if (left < right) return -1 * factor;
				if (left > right) return 1 * factor;
				return 0;
			});
			return sorted;
		}

		function renderUsers(users) {
			if (!users.length) {
				usersTableBody.innerHTML = '<tr><td colspan="6">No users found for current filters. <button id="clearUserFiltersBtn" class="btn btn-secondary btn-sm" type="button">Reset Filters</button></td></tr>';
				const clearBtn = document.getElementById('clearUserFiltersBtn');
				if (clearBtn) {
					clearBtn.addEventListener('click', () => {
						searchInput.value = '';
						roleFilter.value = '';
						blockedFilter.value = '';
						recordFilter.value = 'active';
						state.search = '';
						state.role = '';
						state.blocked = '';
						state.record = 'active';
						state.page = 1;
						fetchUsers();
					});
				}
				return;
			}

			const sortedUsers = applySort(users);
			usersTableBody.innerHTML = sortedUsers.map((user) => {
				const statusClass = user.isBlocked ? 'blocked' : 'active';
				return `
					<tr data-row-user-id="${user._id}">
						<td>${user.name || '-'}</td>
						<td>${user.email || '-'}</td>
						<td><span class="status ${user.role}">${user.role}</span></td>
						<td><span class="status ${statusClass}">${statusClass}</span></td>
						<td>${formatDate(user.createdAt)}</td>
						<td>${userActionsTemplate(user)}</td>
					</tr>
				`;
			}).join('');

			sortedUsers.forEach((user) => {
				const row = usersTableBody.querySelector(`[data-row-user-id="${user._id}"]`);
				if (row) {
					row.addEventListener('click', (event) => {
						if (event.target.closest('button')) return;
						openUserDrawer(user);
					});
				}
			});

			usersTableBody.querySelectorAll('[data-block-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleBlockUser(btn.getAttribute('data-block-id'));
				});
			});

			usersTableBody.querySelectorAll('[data-unblock-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleUnblockUser(btn.getAttribute('data-unblock-id'));
				});
			});

			usersTableBody.querySelectorAll('[data-archive-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleArchiveUser(btn.getAttribute('data-archive-id'));
				});
			});

			usersTableBody.querySelectorAll('[data-restore-id]').forEach((btn) => {
				btn.addEventListener('click', () => {
					handleRestoreUser(btn.getAttribute('data-restore-id'));
				});
			});
		}

		async function fetchUsers() {
			clearAlert(listAlert);

			const params = new URLSearchParams({
				page: String(state.page),
				limit: String(state.limit)
			});

			if (state.search) {
				params.set('search', state.search);
			}

			if (state.role) {
				params.set('role', state.role);
			}

			if (state.blocked !== '') {
				params.set('blocked', state.blocked);
			}

			if (state.record === 'all') {
				params.set('includeDeleted', 'true');
			} else if (state.record === 'deleted') {
				params.set('deleted', 'true');
			}

			try {
				const response = await apiRequest(`/admin/users?${params.toString()}`);
				const users = response?.data?.users || [];
				const pagination = response?.data?.pagination || {};

				state.totalPages = Number(pagination.totalPages || 1);
				pageMeta.textContent = `Page ${state.page} of ${state.totalPages}`;
				prevBtn.disabled = state.page <= 1;
				nextBtn.disabled = state.page >= state.totalPages;

				renderUsers(users);
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to load users.', 'error');
				usersTableBody.innerHTML = '';
			}
		}

		async function handleBlockUser(userId) {
			try {
				await apiRequest(`/admin/users/${userId}/block`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'User blocked successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to block user.', 'error');
			}
		}

		async function handleUnblockUser(userId) {
			try {
				await apiRequest(`/admin/users/${userId}/unblock`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'User unblocked successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to unblock user.', 'error');
			}
		}

		async function handleArchiveUser(userId) {
			const confirmed = window.ODPLayout?.confirmAction
				? await window.ODPLayout.confirmAction({
					title: 'Archive User Account',
					message: 'This will move the user to archived records. You can restore later from archived view.',
					confirmText: 'Archive User'
				})
				: window.confirm('This will move the user to archived records. You can restore later from archived view.');
			if (!confirmed) {
				return;
			}

			try {
				await apiRequest(`/admin/users/${userId}`, {
					method: 'DELETE'
				});

				setAlert(listAlert, 'User archived successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to archive user.', 'error');
			}
		}

		async function handleRestoreUser(userId) {
			try {
				await apiRequest(`/admin/users/${userId}/restore`, {
					method: 'PATCH'
				});

				setAlert(listAlert, 'User restored successfully.', 'ok');
				await fetchUsers();
			} catch (error) {
				setAlert(listAlert, error.message || 'Failed to restore user.', 'error');
			}
		}

		function initControls() {
			limitFilter.value = String(state.limit);
			closeDrawerBtn.addEventListener('click', () => {
				userDrawer.classList.remove('show');
			});

			limitFilter.addEventListener('change', () => {
				state.limit = Number(limitFilter.value || 10);
				localStorage.setItem('odp.admin.users.limit', String(state.limit));
				state.page = 1;
				fetchUsers();
			});

			document.querySelectorAll('.sortable-th').forEach((header) => {
				header.addEventListener('click', () => {
					const key = header.getAttribute('data-sort');
					if (!key) return;
					if (state.sortBy === key) {
						state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
					} else {
						state.sortBy = key;
						state.sortDir = 'asc';
					}
					document.querySelectorAll('.sortable-th').forEach((th) => {
						th.removeAttribute('data-dir');
					});
					header.setAttribute('data-dir', state.sortDir);
					fetchUsers();
				});
			});

			applyFilterBtn.addEventListener('click', () => {
				applyFilterBtn.classList.add('pulse-once');
				state.search = searchInput.value.trim();
				state.role = roleFilter.value;
				state.blocked = blockedFilter.value;
				state.record = recordFilter.value;
				state.page = 1;
				fetchUsers();
				setTimeout(() => applyFilterBtn.classList.remove('pulse-once'), 600);
			});

			searchInput.addEventListener('keydown', (event) => {
				if (event.key === 'Enter') {
					state.search = searchInput.value.trim();
					state.role = roleFilter.value;
					state.blocked = blockedFilter.value;
					state.record = recordFilter.value;
					state.page = 1;
					fetchUsers();
				}
			});

			prevBtn.addEventListener('click', () => {
				if (state.page > 1) {
					state.page -= 1;
					fetchUsers();
				}
			});

			nextBtn.addEventListener('click', () => {
				if (state.page < state.totalPages) {
					state.page += 1;
					fetchUsers();
				}
			});
		}

		function init() {
			if (!safeRequireAdmin(['support', 'finance', 'admin', 'super_admin'], '/admin/login')) {
				return;
			}

			window.ODPLayout?.initGlobalUX?.({
				pageHeader: {
					pageKey: 'admin-users',
					containerSelector: '.page-shell',
					title: 'User Governance',
					subtitle: 'Moderate accounts, review access status, and respond quickly to safety actions.',
					primaryAction: { label: 'Open Dashboard', href: '/admin/dashboard' }
				}
			});

			logoutBtn.addEventListener('click', () => {
				Auth.clearSession();
				window.location.href = '/admin/login';
			});

			initControls();
			showUsers();
			fetchUsers();
