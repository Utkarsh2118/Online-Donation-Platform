<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Campaigns</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.toolbar {
			display: flex;
			gap: 0.7rem;
			flex-wrap: wrap;
			align-items: center;
			justify-content: space-between;
			margin: 0.8rem 0 1rem;
		}

		.toolbar input {
			width: min(360px, 100%);
			border: 1px solid #ccbfae;
			border-radius: 999px;
			padding: 0.65rem 0.95rem;
			background: #fffefb;
			font: inherit;
		}

		.page-title {
			margin: 0.6rem 0 0;
			font-size: clamp(1.35rem, 2.8vw, 2rem);
		}

		.muted {
			color: var(--muted);
			margin: 0.35rem 0 0.8rem;
		}

		.campaign-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 0.9rem;
			margin: 1rem 0 1.25rem;
		}

		.campaign-card {
			background: #fffaf2;
			border: 1px solid #eadfce;
			border-radius: 14px;
			padding: 0.9rem;
			display: grid;
			gap: 0.62rem;
			box-shadow: var(--shadow-soft);
		}

		.campaign-card h3 {
			margin: 0;
			font-size: 1.05rem;
			line-height: 1.3;
		}

		.campaign-card p {
			margin: 0;
			color: var(--muted);
			font-size: 0.93rem;
			line-height: 1.5;
		}

		.progress-track {
			height: 9px;
			width: 100%;
			border-radius: 999px;
			background: #efe5d7;
			overflow: hidden;
		}

		.progress-fill {
			height: 100%;
			background: linear-gradient(90deg, #0f766e 0%, #f59e0b 100%);
			border-radius: inherit;
			width: 0;
		}

		.meta {
			display: flex;
			justify-content: space-between;
			gap: 0.4rem;
			font-size: 0.87rem;
			color: var(--muted);
		}

		.status {
			display: inline-flex;
			align-items: center;
			padding: 0.2rem 0.55rem;
			border-radius: 999px;
			font-size: 0.78rem;
			font-weight: 700;
			background: #ecfdf3;
			color: #067647;
			width: fit-content;
		}

		.panel {
			background: #fffaf2;
			border: 1px solid #eadfce;
			border-radius: 12px;
			padding: 0.95rem;
			color: var(--muted);
		}

		.pagination {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 1.4rem;
			gap: 0.7rem;
			flex-wrap: wrap;
		}

		@media (max-width: 980px) {
			.campaign-grid {
				grid-template-columns: repeat(2, 1fr);
			}
		}

		@media (max-width: 700px) {
			.campaign-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="sidebar-layout">
		<aside class="side-nav" aria-label="User navigation">
			<a class="brand" href="./home.html">OpenDonate Platform</a>
			<nav class="side-nav-list" aria-label="Sidebar links">
				<a class="side-nav-link" href="./home.html">Home</a>
				<a class="side-nav-link" href="./dashboard.html">Dashboard</a>
				<a class="side-nav-link active" href="./campaigns.html" aria-current="page">Campaigns</a>
				<a class="side-nav-link" href="./profile.html">Profile</a>
			</nav>
			<button id="logoutBtn" class="btn btn-outline" type="button">Logout</button>
		</aside>

		<main class="content-panel">
			<h1 class="page-title">Active Campaigns</h1>
			<p class="muted">Find a cause, review progress, and donate with confidence.</p>

			<section class="toolbar" aria-label="Campaign controls">
				<input id="searchInput" type="search" placeholder="Search campaigns by title or cause" />
				<button id="searchBtn" class="btn btn-primary" type="button">Search</button>
			</section>

			<section id="feedbackPanel" class="panel">Loading campaigns...</section>
			<section id="campaignGrid" class="campaign-grid" aria-live="polite"></section>

			<section class="pagination">
				<button id="prevBtn" class="btn btn-outline" type="button">Previous</button>
				<span id="pageMeta" class="muted">Page 1</span>
				<button id="nextBtn" class="btn btn-outline" type="button">Next</button>
			</section>
		</main>
	</div>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script>
		const campaignGrid = document.getElementById('campaignGrid');
		const feedbackPanel = document.getElementById('feedbackPanel');
		const searchInput = document.getElementById('searchInput');
		const searchBtn = document.getElementById('searchBtn');
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const pageMeta = document.getElementById('pageMeta');
		const logoutBtn = document.getElementById('logoutBtn');

		const state = {
			page: 1,
			limit: 9,
			search: '',
			totalPages: 1
		};

		function formatCurrency(value) {
			return new Intl.NumberFormat('en-IN', {
				style: 'currency',
				currency: 'INR',
				maximumFractionDigits: 0
			}).format(Number(value || 0));
		}

		function setFeedback(message) {
			feedbackPanel.style.display = 'block';
			feedbackPanel.textContent = message;
		}

		function hideFeedback() {
			feedbackPanel.style.display = 'none';
		}

		function getProgress(raised, goal) {
			if (!goal || goal <= 0) {
				return 0;
			}

			return Math.min(100, Math.round((raised / goal) * 100));
		}

		function cardTemplate(campaign) {
			const progress = getProgress(campaign.raisedAmount, campaign.goalAmount);
			const shortDescription = campaign.description.length > 115
				? `${campaign.description.slice(0, 115)}...`
				: campaign.description;

			return `
				<article class="campaign-card">
					<span class="status">${campaign.status}</span>
					<h3>${campaign.title}</h3>
					<p>${shortDescription}</p>

					<div class="progress-track">
						<div class="progress-fill" style="width:${progress}%"></div>
					</div>

					<div class="meta">
						<span>Raised: ${formatCurrency(campaign.raisedAmount)}</span>
						<span>Goal: ${formatCurrency(campaign.goalAmount)}</span>
					</div>

					<div class="meta">
						<strong>${progress}% funded</strong>
						<button class="btn btn-primary" data-id="${campaign._id}" type="button">View Details</button>
					</div>
				</article>
			`;
		}

		function renderCampaigns(campaigns) {
			if (!campaigns.length) {
				campaignGrid.innerHTML = '';
				setFeedback('No campaigns found. Try another search keyword.');
				return;
			}

			hideFeedback();
			campaignGrid.innerHTML = campaigns.map(cardTemplate).join('');

			campaignGrid.querySelectorAll('button[data-id]').forEach((button) => {
				button.addEventListener('click', () => {
					const campaignId = button.getAttribute('data-id');
					window.location.href = `./campaign-details.html?id=${campaignId}`;
				});
			});
		}

		async function fetchCampaigns() {
			setFeedback('Loading campaigns...');
			campaignGrid.innerHTML = '';

			const query = new URLSearchParams({
				page: String(state.page),
				limit: String(state.limit)
			});

			if (state.search) {
				query.set('search', state.search);
			}

			try {
				const response = await apiRequest(`/campaigns?${query.toString()}`);
				const campaigns = response?.data?.campaigns || [];
				const pagination = response?.data?.pagination || {};

				state.totalPages = Number(pagination.totalPages || 1);
				pageMeta.textContent = `Page ${state.page} of ${state.totalPages}`;
				prevBtn.disabled = state.page <= 1;
				nextBtn.disabled = state.page >= state.totalPages;

				renderCampaigns(campaigns);
			} catch (error) {
				setFeedback(error.message || 'Unable to load campaigns right now.');
			}
		}

		function init() {
			if (!Auth.requireAuth('./login.html')) {
				return;
			}

			const user = Auth.getUser();
			if (user?.role === 'admin') {
				window.location.href = '../admin/dashboard.html';
				return;
			}

			logoutBtn.addEventListener('click', () => {
				Auth.clearSession();
				window.location.href = './login.html';
			});

			searchBtn.addEventListener('click', () => {
				state.search = searchInput.value.trim();
				state.page = 1;
				fetchCampaigns();
			});

			searchInput.addEventListener('keydown', (event) => {
				if (event.key === 'Enter') {
					state.search = searchInput.value.trim();
					state.page = 1;
					fetchCampaigns();
				}
			});

			prevBtn.addEventListener('click', () => {
				if (state.page > 1) {
					state.page -= 1;
					fetchCampaigns();
				}
			});

			nextBtn.addEventListener('click', () => {
				if (state.page < state.totalPages) {
					state.page += 1;
					fetchCampaigns();
				}
			});

			fetchCampaigns();
		}

		init();
	</script>
</body>
</html>
