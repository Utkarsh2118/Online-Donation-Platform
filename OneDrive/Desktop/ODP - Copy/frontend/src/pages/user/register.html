<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Register</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.auth-wrap {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1.2rem;
		}

		.auth-card {
			width: min(480px, 100%);
			background: #ffffff;
			border-radius: 16px;
			box-shadow: var(--shadow-soft);
			padding: 1.2rem;
			border: 1px solid #e2e8f0;
		}

		.auth-card h1 {
			margin: 0 0 0.5rem;
			font-size: 1.45rem;
		}

		.auth-card p {
			margin: 0 0 1rem;
			color: var(--muted);
		}

		.field {
			display: grid;
			gap: 0.35rem;
			margin-bottom: 0.85rem;
		}

		.field label {
			font-size: 0.9rem;
			font-weight: 700;
		}

		.field input {
			width: 100%;
			border: 1px solid #cbd5e1;
			border-radius: 10px;
			padding: 0.72rem 0.8rem;
			font: inherit;
			background: #fff;
		}

		.auth-footer {
			margin-top: 0.9rem;
			font-size: 0.92rem;
			color: var(--muted);
		}

		.alert {
			display: none;
			margin-bottom: 0.8rem;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}
	</style>
</head>
<body>
	<main class="auth-wrap">
		<section class="auth-card" aria-labelledby="registerTitle">
			<a class="brand" href="./landing.html">OpenDonate Platform</a>
			<h1 id="registerTitle">Create your account</h1>
			<p>Join in less than a minute and start supporting campaigns.</p>

			<div id="alertBox" class="alert"></div>

			<form id="registerForm" novalidate>
				<div class="field">
					<label for="name">Full Name</label>
					<input id="name" name="name" type="text" minlength="2" maxlength="60" required />
				</div>

				<div class="field">
					<label for="email">Email Address</label>
					<input id="email" name="email" type="email" required />
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" minlength="8" required />
				</div>

				<button id="registerBtn" class="btn btn-primary" type="submit">Create Account</button>
			</form>

			<p class="auth-footer">
				Already have an account?
				<a href="./login.html">Login</a>
			</p>
		</section>
	</main>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script>
		const form = document.getElementById('registerForm');
		const registerBtn = document.getElementById('registerBtn');
		const alertBox = document.getElementById('alertBox');

		function showAlert(message, type) {
			alertBox.className = `alert ${type}`;
			alertBox.textContent = message;
		}

		function clearAlert() {
			alertBox.className = 'alert';
			alertBox.textContent = '';
		}

		function validateInput(name, email, password) {
			if (name.trim().length < 2) {
				return 'Name must be at least 2 characters.';
			}

			if (!/^\S+@\S+\.\S+$/.test(email)) {
				return 'Please provide a valid email address.';
			}

			if (password.length < 8) {
				return 'Password must be at least 8 characters.';
			}

			return null;
		}

		async function handleRegister(event) {
			event.preventDefault();
			clearAlert();

			const formData = new FormData(form);
			const name = String(formData.get('name') || '').trim();
			const email = String(formData.get('email') || '').trim().toLowerCase();
			const password = String(formData.get('password') || '');

			const validationError = validateInput(name, email, password);
			if (validationError) {
				showAlert(validationError, 'error');
				return;
			}

			registerBtn.disabled = true;
			registerBtn.textContent = 'Creating...';

			try {
				const response = await apiRequest('/auth/register', {
					method: 'POST',
					body: JSON.stringify({ name, email, password })
				});

				const token = response?.data?.token;
				const user = response?.data?.user;

				if (!token || !user) {
					throw new Error('Registration response is incomplete.');
				}

				Auth.setSession(token, user);
				showAlert('Registration successful. Redirecting...', 'ok');

				setTimeout(() => {
					window.location.href = './home.html';
				}, 700);
			} catch (error) {
				showAlert(error.message || 'Unable to register right now.', 'error');
			} finally {
				registerBtn.disabled = false;
				registerBtn.textContent = 'Create Account';
			}
		}

		function init() {
			if (Auth.isLoggedIn()) {
				const user = Auth.getUser();
				if (user?.role === 'admin') {
					window.location.href = '../admin/dashboard.html';
					return;
				}

				window.location.href = './home.html';
				return;
			}

			form.addEventListener('submit', handleRegister);
		}

		init();
	</script>
</body>
</html>
