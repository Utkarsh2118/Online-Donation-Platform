<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ODP | Campaigns - Make a Difference</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../assets/css/main.css" />
<style>
.campaigns-header {
display: grid;
gap: var(--space-2);
margin-bottom: var(--space-4);
}

.campaigns-header h1 { margin: 0; }

.toolbar {
display: flex;
justify-content: flex-start;
align-items: center;
gap: var(--space-2);
margin-bottom: var(--space-4);
flex-wrap: wrap;
}

.toolbar-delay { animation-delay: 0.1s; }

.search-bar {
display: flex;
align-items: center;
gap: var(--space-2);
background: var(--surface-primary);
border: 1px solid var(--neutral-200);
border-radius: var(--radius-lg);
padding: var(--space-1);
transition: all var(--transition-fast);
width: min(720px, 100%);
}

.search-bar:focus-within {
border-color: var(--primary);
box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
}

.search-icon {
font-size: var(--text-xs);
font-weight: 700;
color: var(--neutral-500);
letter-spacing: 0.1em;
text-transform: uppercase;
}

.search-bar input {
flex: 1;
border: none;
background: transparent;
color: var(--neutral-900);
font-size: var(--text-base);
min-width: 220px;
}

.search-bar input::placeholder { color: var(--neutral-400); }

.campaign-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: var(--space-3);
margin-bottom: var(--space-4);
}

.campaign-card {
background: var(--surface-primary);
border: 1px solid var(--neutral-200);
border-radius: var(--radius-md);
overflow: hidden;
display: flex;
flex-direction: column;
transition: all var(--transition-normal);
box-shadow: var(--shadow-sm);
cursor: pointer;
}

.campaign-card:hover {
transform: translateY(-1px);
box-shadow: var(--shadow-xl);
border-color: var(--primary);
}

.campaign-card-header {
height: 96px;
background: var(--neutral-50);
border-bottom: 1px solid var(--neutral-200);
display: flex;
align-items: center;
justify-content: space-between;
padding: var(--space-3);
}

.campaign-badge {
width: 42px;
height: 42px;
border-radius: var(--radius-md);
background: var(--primary);
color: white;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
letter-spacing: 0.04em;
}

.campaign-status-line {
font-size: var(--text-xs);
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(--neutral-500);
}

.campaign-card-content {
padding: var(--space-3);
display: flex;
flex-direction: column;
gap: var(--space-2);
flex-grow: 1;
}

.campaign-status { display: inline-block; width: fit-content; }

.campaign-title {
font-size: var(--text-lg);
font-weight: 700;
margin: 0;
color: var(--neutral-900);
line-height: var(--line-height-tight);
}

.campaign-desc {
font-size: var(--text-sm);
color: var(--neutral-600);
margin: 0;
line-height: var(--line-height-normal);
display: -webkit-box;
-webkit-line-clamp: 2;
line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.campaign-meta { display: grid; gap: var(--space-2); margin-top: auto; }

.fund-info {
display: flex;
justify-content: space-between;
align-items: center;
font-size: var(--text-sm);
color: var(--neutral-600);
}

.fund-raised { font-weight: 700; color: var(--primary); }
.progress-container { display: grid; gap: var(--space-1); }

.progress-header {
display: flex;
justify-content: space-between;
align-items: center;
font-size: var(--text-xs);
font-weight: 700;
}

.cta-donate {
background: var(--primary);
color: white;
border: none;
padding: var(--space-2);
border-radius: 6px;
font-weight: 700;
cursor: pointer;
transition: all var(--transition-fast);
width: 100%;
margin-top: auto;
}

.cta-donate:hover {
transform: translateY(-2px);
box-shadow: var(--shadow-lg);
}

.pagination {
display: flex;
justify-content: center;
align-items: center;
gap: var(--space-2);
margin-top: var(--space-4);
flex-wrap: wrap;
}

.pagination-info {
color: var(--neutral-600);
font-size: var(--text-sm);
font-weight: 600;
}

.empty-state {
text-align: center;
padding: var(--space-6);
grid-column: 1 / -1;
background: var(--surface-primary);
border: 1px solid var(--neutral-200);
border-radius: var(--radius-xl);
color: var(--neutral-500);
}

.empty-icon { font-size: 64px; margin-bottom: var(--space-2); }

@media (max-width: 1200px) {
.campaign-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
.campaign-grid { grid-template-columns: 1fr; }
.search-bar { width: 100%; }
.search-bar input { font-size: 16px; }
}
</style>
</head>
<body>
<div class="sidebar-layout">
<aside class="side-nav" aria-label="User navigation">
<div class="brand">
<div class="brand-icon">OD</div>
<span>OpenDonate</span>
</div>
<nav class="side-nav-list" aria-label="Sidebar links">
<a class="side-nav-link" href="./home.html">
<span class="side-nav-icon">HM</span>
<span>Home</span>
</a>
<a class="side-nav-link" href="./dashboard.html">
<span class="side-nav-icon">DB</span>
<span>Dashboard</span>
</a>
<a class="side-nav-link active" href="./campaigns.html" aria-current="page">
<span class="side-nav-icon">CP</span>
<span>Campaigns</span>
</a>
<a class="side-nav-link" href="./profile.html">
<span class="side-nav-icon">PR</span>
<span>Profile</span>
</a>
</nav>
<button id="logoutBtn" class="btn btn-outline">Logout</button>
</aside>

<main class="content-panel">
<div class="campaigns-header animate-fade-in">
<h1>Active Campaigns</h1>
<p class="text-muted">Find verified causes and review campaign progress with confidence.</p>
</div>

<div class="toolbar animate-fade-in toolbar-delay">
<div class="search-bar">
<span class="search-icon">Search</span>
<input id="searchInput" type="search" placeholder="Search campaigns by title or cause..." />
</div>
<button id="searchBtn" class="btn btn-primary">Search</button>
</div>

<div id="campaignGrid" class="campaign-grid" aria-live="polite"></div>

<div class="pagination">
<button id="prevBtn" class="btn btn-secondary btn-sm" type="button">← Previous</button>
<span id="pageMeta" class="pagination-info">Page 1</span>
<button id="nextBtn" class="btn btn-secondary btn-sm" type="button">Next →</button>
</div>
</main>
</div>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
const campaignGrid = document.getElementById('campaignGrid');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageMeta = document.getElementById('pageMeta');
const logoutBtn = document.getElementById('logoutBtn');

const state = { page: 1, limit: 9, search: '', totalPages: 1 };

function formatCurrency(value) {
return new Intl.NumberFormat('en-IN', {
style: 'currency',
currency: 'INR',
maximumFractionDigits: 0
}).format(Number(value || 0));
}

function getProgress(raised, goal) {
if (!goal || goal <= 0) return 0;
return Math.min(100, Math.round((raised / goal) * 100));
}

function getCampaignBadge(campaign) {
const title = String(campaign.title || 'Campaign').trim();
const words = title.split(/\s+/).slice(0, 2);
return words.map((word) => word[0]?.toUpperCase() || '').join('') || 'CP';
}

function cardTemplate(campaign) {
const progress = getProgress(campaign.raisedAmount, campaign.goalAmount);
const badge = getCampaignBadge(campaign);

return `
<article class="campaign-card animate-fade-in">
<div class="campaign-card-header">
<div class="campaign-badge">${badge}</div>
<div class="campaign-status-line">${String(campaign.status || 'active').toUpperCase()}</div>
</div>
<div class="campaign-card-content">
<div class="campaign-status"><span class="badge badge-success">${String(campaign.status || 'active').toUpperCase()}</span></div>
<h3 class="campaign-title">${campaign.title}</h3>
<p class="campaign-desc">${campaign.description}</p>
<div class="campaign-meta">
<div class="fund-info">
<span>Raised: <strong class="fund-raised">${formatCurrency(campaign.raisedAmount)}</strong></span>
<span>Goal: ${formatCurrency(campaign.goalAmount)}</span>
</div>
<div class="progress-container">
<div class="progress-header"><span>Progress</span><strong>${progress}%</strong></div>
<div class="progress-track"><div class="progress-fill" style="width: ${progress}%;"></div></div>
</div>
</div>
<button class="cta-donate" data-id="${campaign._id}">Donate Now</button>
</div>
</article>
`;
}

function renderCampaigns(campaigns) {
if (!campaigns.length) {
campaignGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">0</div><h3>No campaigns found</h3><p>Try adjusting your search or filters to find more campaigns.</p></div>`;
return;
}

campaignGrid.innerHTML = campaigns.map(cardTemplate).join('');
campaignGrid.querySelectorAll('button[data-id]').forEach((button) => {
button.addEventListener('click', () => {
const campaignId = button.getAttribute('data-id');
window.location.href = `./campaign-details.html?id=${campaignId}`;
});
});
}

async function fetchCampaigns() {
campaignGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">...</div><p>Loading campaigns...</p></div>`;
try {
const query = new URLSearchParams({ page: String(state.page), limit: String(state.limit), ...(state.search && { search: state.search }) });
const response = await apiRequest(`/campaigns?${query.toString()}`);
const campaigns = response?.data?.campaigns || [];
const pagination = response?.data?.pagination || {};
state.totalPages = Number(pagination.totalPages || 1);
pageMeta.textContent = `Page ${state.page} of ${state.totalPages}`;
prevBtn.disabled = state.page <= 1;
nextBtn.disabled = state.page >= state.totalPages;
renderCampaigns(campaigns);
} catch (error) {
campaignGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">!</div><h3>Failed to load campaigns</h3><p>${error.message || 'Please try again later.'}</p></div>`;
}
}

function init() {
if (!Auth.requireAuth('./login.html')) return;
if (Auth.getUser()?.role === 'admin') {
window.location.href = '../admin/dashboard.html';
return;
}

logoutBtn.addEventListener('click', () => {
Auth.clearSession();
window.location.href = './login.html';
});

searchBtn.addEventListener('click', () => {
state.search = searchInput.value.trim();
state.page = 1;
fetchCampaigns();
});

searchInput.addEventListener('keydown', (e) => {
if (e.key === 'Enter') {
state.search = searchInput.value.trim();
state.page = 1;
fetchCampaigns();
}
});

prevBtn.addEventListener('click', () => {
if (state.page > 1) {
state.page -= 1;
fetchCampaigns();
window.scrollTo(0, 0);
}
});

nextBtn.addEventListener('click', () => {
if (state.page < state.totalPages) {
state.page += 1;
fetchCampaigns();
window.scrollTo(0, 0);
}
});

fetchCampaigns();
}

init();
</script>
</body>
</html>
