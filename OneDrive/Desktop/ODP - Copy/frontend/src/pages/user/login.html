<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ODP | Login</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../assets/css/main.css" />
	<style>
		.auth-wrap {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1.2rem;
		}

		.auth-card {
			width: min(460px, 100%);
			background: #ffffff;
			border-radius: 16px;
			box-shadow: var(--shadow-soft);
			padding: 1.2rem;
			border: 1px solid #e2e8f0;
		}

		.auth-card h1 {
			margin: 0.35rem 0 0.5rem;
			font-size: 1.45rem;
		}

		.auth-card p {
			margin: 0 0 1rem;
			color: var(--muted);
		}

		.field {
			display: grid;
			gap: 0.35rem;
			margin-bottom: 0.85rem;
		}

		.field label {
			font-size: 0.9rem;
			font-weight: 700;
		}

		.field input {
			width: 100%;
			border: 1px solid #cbd5e1;
			border-radius: 10px;
			padding: 0.72rem 0.8rem;
			font: inherit;
			background: #fff;
		}

		.auth-footer {
			margin-top: 0.9rem;
			font-size: 0.92rem;
			color: var(--muted);
			display: flex;
			justify-content: space-between;
			gap: 0.8rem;
			flex-wrap: wrap;
		}

		.alert {
			display: none;
			margin-bottom: 0.8rem;
			border-radius: 9px;
			padding: 0.62rem 0.75rem;
			font-size: 0.92rem;
		}

		.alert.error {
			display: block;
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid #fecdca;
		}

		.alert.ok {
			display: block;
			background: #ecfdf3;
			color: var(--ok);
			border: 1px solid #abefc6;
		}
	</style>
</head>
<body>
	<main class="auth-wrap">
		<section class="auth-card" aria-labelledby="loginTitle">
			<a class="brand" href="./landing.html">OpenDonate Platform</a>
			<h1 id="loginTitle">Welcome back</h1>
			<p>Login to manage donations, campaigns, and your dashboard.</p>

			<div id="alertBox" class="alert"></div>

			<form id="loginForm" novalidate>
				<div class="field">
					<label for="email">Email Address</label>
					<input id="email" name="email" type="email" required />
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" required />
				</div>

				<button id="loginBtn" class="btn btn-primary" type="submit">Login</button>
			</form>

			<p class="auth-footer">
				<span>New here? <a href="./register.html">Create account</a></span>
				<span>Admin? <a href="../admin/login.html">Use admin login</a></span>
			</p>
		</section>
	</main>

	<script src="../../assets/js/config.js"></script>
	<script src="../../assets/js/auth.js"></script>
	<script src="../../assets/js/api.js"></script>
	<script>
		const form = document.getElementById('loginForm');
		const loginBtn = document.getElementById('loginBtn');
		const alertBox = document.getElementById('alertBox');

		function showAlert(message, type) {
			alertBox.className = `alert ${type}`;
			alertBox.textContent = message;
		}

		function clearAlert() {
			alertBox.className = 'alert';
			alertBox.textContent = '';
		}

		function validateInput(email, password) {
			if (!/^\S+@\S+\.\S+$/.test(email)) {
				return 'Please provide a valid email address.';
			}

			if (!password) {
				return 'Password is required.';
			}

			return null;
		}

		function roleRedirect(user) {
			if (user.role === 'admin') {
				window.location.href = '../admin/dashboard.html';
				return;
			}

			window.location.href = './home.html';
		}

		async function handleLogin(event) {
			event.preventDefault();
			clearAlert();

			const formData = new FormData(form);
			const email = String(formData.get('email') || '').trim().toLowerCase();
			const password = String(formData.get('password') || '');

			const validationError = validateInput(email, password);
			if (validationError) {
				showAlert(validationError, 'error');
				return;
			}

			loginBtn.disabled = true;
			loginBtn.textContent = 'Signing in...';

			try {
				const response = await apiRequest('/auth/login', {
					method: 'POST',
					body: JSON.stringify({ email, password })
				});

				const token = response?.data?.token;
				const user = response?.data?.user;

				if (!token || !user) {
					throw new Error('Login response is incomplete.');
				}

				Auth.setSession(token, user);
				showAlert('Login successful. Redirecting...', 'ok');

				setTimeout(() => roleRedirect(user), 650);
			} catch (error) {
				const message = error.message || 'Unable to login right now.';

				if (message.toLowerCase().includes('blocked')) {
					showAlert('Your account is blocked. Please contact support.', 'error');
				} else {
					showAlert(message, 'error');
				}
			} finally {
				loginBtn.disabled = false;
				loginBtn.textContent = 'Login';
			}
		}

		function init() {
			if (Auth.isLoggedIn()) {
				const user = Auth.getUser();
				roleRedirect(user || { role: 'user' });
				return;
			}

			form.addEventListener('submit', handleLogin);
		}

		init();
	</script>
</body>
</html>
